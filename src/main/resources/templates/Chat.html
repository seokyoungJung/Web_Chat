<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Chatting Room</title></head>
<body>
<h2>1. 방 만들기</h2>
<input type="text" id="roomName" placeholder="방 이름">
<button onclick="createRoom()">생성</button>

<hr>

<h2>2. 참여 가능한 방 목록</h2>
<button onclick="refreshRoomList()">목록 새로고침</button>
<ul id="roomList">
</ul>

<hr>

<h2>3. 채팅 창 (<span id="currentRoomTitle">방을 선택하세요</span>)</h2>
<div id="log" style="border:1px solid #ccc; height:200px; overflow-y:auto; margin-bottom:10px;"></div>
<input type="text" id="msg" placeholder="메시지 입력">
<button onclick="send()">전송</button>

<script>
    let socket;
    let selectedRoomId = "";

    // [API 호출] 방 만들기
    async function createRoom() {
        const name = document.getElementById('roomName').value;
        await fetch(`/chat?name=${name}`, { method: 'POST' });
        refreshRoomList(); // 만들고 나서 목록 갱신
    }

    // [API 호출] 서버에 있는 모든 방 가져오기 (2번 사용자가 쓸 기능)
    async function refreshRoomList() {
        const response = await fetch('/chat');
        const rooms = await response.json();

        const roomList = document.getElementById('roomList');
        roomList.innerHTML = '';

        rooms.forEach(room => {
            const li = document.createElement('li');
            li.innerHTML = `${room.name}
                    <button onclick="connect('${room.roomId}', '${room.name}')">입장</button>`;
            roomList.appendChild(li);
        });
    }

    // [웹소켓] 특정 방에 입장하기
    function connect(roomId, roomName) {
        if(socket) socket.close(); // 기존 연결이 있다면 끊기

        selectedRoomId = roomId;
        document.getElementById('currentRoomTitle').innerText = roomName;

        socket = new WebSocket("ws://localhost:8080/socket-test");

        socket.onmessage = (e) => {
            const data = JSON.parse(e.data);
            // 내가 지금 들어와 있는 방의 메시지만 표시 (중요!)
            if(data.roomId === selectedRoomId) {
                document.getElementById('log').innerHTML += `<div>${data.sender}: ${data.message}</div>`;
            }
        };
        alert(roomName + " 방에 입장했습니다.");
    }

    function send() {
        if(!selectedRoomId) { alert("방에 먼저 입장하세요!"); return; }

        const msg = document.getElementById('msg').value;
        const chatPayload = {
            type: 'TALK',
            roomId: selectedRoomId,
            sender: '사용자' + Math.floor(Math.random()*100), // 구분용 랜덤 이름
            message: msg
        };
        socket.send(JSON.stringify(chatPayload));
        document.getElementById('log').innerHTML += `<div style="color:blue;">나: ${msg}</div>`;
        document.getElementById('msg').value = '';
    }

    // 처음 접속 시 목록 로드
    window.onload = refreshRoomList;
</script>
</body>
</html>
